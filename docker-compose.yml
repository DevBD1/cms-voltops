services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: voltops-api
    environment:
      NODE_ENV: production
      PORT: 3000
      API_DEBUG: ${API_DEBUG:-false}
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL to the Supabase Postgres connection string}
      SUPABASE_URL: ${SUPABASE_URL:?Set SUPABASE_URL to the Supabase project URL}
      SUPABASE_PUBLISHABLE_KEY: ${SUPABASE_PUBLISHABLE_KEY:?Set SUPABASE_PUBLISHABLE_KEY to the Supabase publishable key}
    ports:
      - "3000:3000"
