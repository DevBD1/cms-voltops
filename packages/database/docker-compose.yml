services:
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: voltops-timescale
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-voltops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-voltops}
      POSTGRES_DB: ${POSTGRES_DB:-voltops}
    ports:
      - "5432:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-voltops}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  timescale_data:
